<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https: http: file:;">
  <title>ColaMD-Plus</title>
</head>
<body>
  <div id="titlebar">
    <div id="agent-dot"></div>
    <button id="slides-btn" title="Open as Slides">&#9654;</button>
  </div>
  <div id="editor"></div>
  <textarea id="source-editor" spellcheck="false"></textarea>
  <div id="image-gallery" class="hidden">
    <div id="gallery-backdrop"></div>
    <div id="gallery-panel">
      <div id="gallery-header">
        <h3>Image Gallery</h3>
        <input id="gallery-search" type="text" placeholder="Search images..." spellcheck="false">
        <button id="gallery-close" title="Close (Esc)">&times;</button>
      </div>
      <div id="gallery-grid"></div>
      <div id="gallery-empty" class="hidden">No images found in this document.</div>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
